apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: workspaces.kelos.dev
spec:
  group: kelos.dev
  names:
    kind: Workspace
    listKind: WorkspaceList
    plural: workspaces
    singular: workspace
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workspace is the Schema for the workspaces API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkspaceSpec defines the desired state of Workspace.
            properties:
              files:
                description: |-
                  Files are written into the cloned repository before the agent starts.
                  This can be used to inject plugin-like assets such as skills
                  (for example, ".claude/skills/<name>/SKILL.md") and instruction files
                  like "CLAUDE.md" or "AGENTS.md".
                items:
                  description: |-
                    WorkspaceFile defines a file to write into the cloned repository before the
                    agent container starts.
                  properties:
                    content:
                      description: Content is the file content to write.
                      type: string
                    path:
                      description: |-
                        Path is the relative file path inside the repository (for example,
                        ".claude/skills/reviewer/SKILL.md" or "CLAUDE.md").
                      minLength: 1
                      type: string
                  required:
                  - content
                  - path
                  type: object
                type: array
              ref:
                description: |-
                  Ref is the git reference to checkout (branch, tag, or commit SHA).
                  Defaults to the repository's default branch if not specified.
                type: string
              remotes:
                description: |-
                  Remotes are additional git remotes to configure after cloning.
                  The credential from SecretRef applies to all remotes.
                items:
                  description: |-
                    GitRemote defines an additional git remote to configure in the cloned
                    repository after the initial clone.
                  properties:
                    name:
                      description: Name is the git remote name (must not be "origin").
                      minLength: 1
                      type: string
                    url:
                      description: URL is the git remote URL.
                      pattern: ^(https?://|git://|git@).*
                      type: string
                  required:
                  - name
                  - url
                  type: object
                type: array
                x-kubernetes-validations:
                - message: remote name 'origin' is reserved for the clone source
                  rule: self.all(r, r.name != 'origin')
                - message: remote names must be unique
                  rule: self.map(r, r.name).size() == self.size()
              repo:
                description: Repo is the git repository URL to clone.
                pattern: ^(https?://|git://|git@).*
                type: string
              secretRef:
                description: |-
                  SecretRef references a Secret containing a GITHUB_TOKEN key for git
                  authentication and GitHub CLI (gh) operations.
                properties:
                  name:
                    description: Name is the name of the secret.
                    type: string
                required:
                - name
                type: object
            required:
            - repo
            type: object
        type: object
    served: true
    storage: true
