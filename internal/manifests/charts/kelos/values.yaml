crds:
  install: true
  keep: true

image:
  tag: "latest"
  pullPolicy: ""

telemetry:
  enabled: true

controllerImage: ghcr.io/kelos-dev/kelos-controller
ghproxy:
  image: ghcr.io/kelos-dev/ghproxy
  allowedUpstreams: "https://api.github.com"
claudeCodeImage: ghcr.io/kelos-dev/claude-code
codexImage: ghcr.io/kelos-dev/codex
geminiImage: ghcr.io/kelos-dev/gemini
opencodeImage: ghcr.io/kelos-dev/opencode
cursorImage: ghcr.io/kelos-dev/cursor
spawner:
  image: ghcr.io/kelos-dev/kelos-spawner
  resources:
    requests: ""
    limits: ""
tokenRefresher:
  image: ghcr.io/kelos-dev/kelos-token-refresher
  resources:
    requests: ""
    limits: ""
controller:
  resources:
    requests: {}
    limits: {}
webhookServer:
  image: ghcr.io/kelos-dev/kelos-webhook-server
  sources:
    github:
      enabled: false
      replicas: 1
      secretName: ""
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  ingress:
    enabled: false
    className: ""
    host: ""
    annotations: {}
    tls:
      enabled: false
      secretName: ""
  gateway:
    enabled: false
    gatewayClassName: ""
    gatewayName: "kelos-webhook-gateway"
    host: ""
    annotations: {}
    tls:
      enabled: false
      certificateRefs: []
