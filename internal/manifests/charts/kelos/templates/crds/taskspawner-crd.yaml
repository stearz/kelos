                          is derived from the workspace repo URL in taskTemplate.workspaceRef.
                          Use this for fork workflows where the workspace points to a fork
                          but pull requests should be discovered from the upstream repository.
                        type: string
                      reporting:
                        description: Reporting configures status reporting back to
                          the originating GitHub pull request.
                        properties:
                          enabled:
                            description: Enabled posts standard status comments back
                              to the originating GitHub issue or PR.
                            type: boolean
                        type: object
                      reviewState:
                        default: any
                        description: |-
                          ReviewState filters pull requests by aggregated review state. The most
                          recent APPROVED or CHANGES_REQUESTED review from each reviewer on the
                          current head SHA is considered. When set to "any", review state does not
                          gate discovery.
                        enum:
                        - approved
                        - changes_requested
                        - any
                        type: string
                      state:
                        default: open
                        description: State filters pull requests by state (open, closed,
                          all). Defaults to open.
                        enum:
                        - open
                        - closed
                        - all
                        type: string
                      triggerComment:
                        description: |-
                          TriggerComment requires a matching comment for the pull request to be
                          included. When set alone, only PRs with a matching comment are
                          discovered. When set together with ExcludeComments, the most recent
                          matching command wins based on comment timestamps.
                          Deprecated: use CommentPolicy.TriggerComment instead.
                        type: string
                    type: object
                    x-kubernetes-validations:
                    - message: commentPolicy cannot be used with triggerComment or
                        excludeComments
                      rule: '!(has(self.commentPolicy) && ((has(self.triggerComment)
                        && size(self.triggerComment) > 0) || (has(self.excludeComments)
                        && size(self.excludeComments) > 0)))'
                  githubWebhook:
                    description: GitHubWebhook triggers task spawning on GitHub webhook
                      events.
                    properties:
                      events:
                        description: |-
                          Events is the list of GitHub event types to listen for.
                          e.g., "issue_comment", "pull_request_review", "push", "issues"
                        items:
                          type: string
                        minItems: 1
                        type: array
                      filters:
                        description: |-
                          Filters refine which events trigger tasks. If multiple filters match
                          the same event type, any match triggers a task (OR semantics).
                          If empty, all events in the Events list trigger tasks.
                        items:
                          description: GitHubWebhookFilter defines filtering criteria
                            for GitHub webhook events.
                          properties:
                            action:
                              description: Action filters by webhook action (e.g.,
                                "created", "opened", "submitted").
                              type: string
                            author:
                              description: Author filters by the event sender's username.
                              type: string
                            bodyContains:
                              description: BodyContains filters by substring match
                                on the comment/review body.
                              type: string
                            branch:
                              description: Branch filters push events by branch name
                                (exact match or glob).
                              type: string
                            draft:
                              description: Draft filters PRs by draft status. nil
                                = don't filter.
                              type: boolean
                            event:
                              description: Event is the GitHub event type this filter
                                applies to.
                              type: string
                            excludeLabels:
                              description: ExcludeLabels excludes issues/PRs with
                                any of these labels.
                              items:
                                type: string
                              type: array
                            labels:
                              description: Labels requires the issue/PR to have all
                                of these labels.
                              items:
                                type: string
                              type: array
                            state:
                              description: State filters by issue/PR state ("open",
                                "closed").
                              type: string
                          required:
                          - event
                          type: object
                        type: array
                      repository:
                        description: |-
                          Repository restricts webhooks to a specific repository (owner/repo format).
                          If empty, webhooks from any repository are accepted.
                        type: string
                    required:
                    - events
                    type: object
                  jira:
                    description: Jira discovers issues from a Jira project.
                    properties:
                      baseUrl:
                        description: BaseURL is the Jira instance URL (e.g., "https://mycompany.atlassian.net").
                        pattern: ^https?://.+
                        type: string
                      jql:
                        description: |-
                          JQL is an optional JQL filter appended to the default query.
                          When set, the full query is: "project = <project> AND (<jql>)".
                          When empty, all issues in the project are discovered.
                        type: string
                      pollInterval:
                        description: |-
                          PollInterval overrides spec.pollInterval for this source (e.g., "30s", "5m").
                          When empty, spec.pollInterval is used.
                        type: string
                      project:
                        description: Project is the Jira project key (e.g., "PROJ").
                        type: string
                      secretRef:
                        description: |-
                          SecretRef references a Secret containing a "JIRA_TOKEN" key (required)
                          and an optional "JIRA_USER" key. When "JIRA_USER" is present, Basic
                          auth is used (Jira Cloud). When absent, Bearer token auth is used
                          (Jira Data Center/Server PAT).
                        properties:
                          name:
                            description: Name is the name of the secret.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - baseUrl
                    - project
                    - secretRef
                    type: object
                type: object
            required:
            - taskTemplate
            - when
            type: object
            x-kubernetes-validations:
            - message: taskTemplate.workspaceRef is required when using githubIssues,
                githubPullRequests, or githubWebhook source
              rule: '!(has(self.when.githubIssues) || has(self.when.githubPullRequests)
                || has(self.when.githubWebhook)) || has(self.taskTemplate.workspaceRef)'
          status:
            description: TaskSpawnerStatus defines the observed state of TaskSpawner.
            properties:
              activeTasks:
                description: ActiveTasks is the number of currently active (non-terminal)
                  Tasks.
                type: integer
              conditions:
                description: Conditions provides detailed status information.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              cronJobName:
                description: |-
                  CronJobName is the name of the CronJob running the spawner.
                  Set for cron-based sources.
                type: string
              deploymentName:
                description: |-
                  DeploymentName is the name of the Deployment running the spawner.
                  Set for polling-based sources (GitHub Issues, Jira).
                type: string
              lastDiscoveryTime:
                description: LastDiscoveryTime is the last time the source was polled.
                format: date-time
                type: string
              message:
                description: Message provides additional information about the current
                  status.
                type: string
              phase:
                description: Phase represents the current phase of the TaskSpawner.
                type: string
              totalDiscovered:
                description: TotalDiscovered is the total number of work items discovered.
                type: integer
              totalTasksCreated:
                description: TotalTasksCreated is the total number of Tasks created.
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
