---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghproxy
  namespace: kelos-system
  labels:
    app.kubernetes.io/name: ghproxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ghproxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ghproxy
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: ghproxy
          image: {{ .Values.ghproxy.image }}{{- if .Values.image.tag }}:{{ .Values.image.tag }}{{- end }}
          {{- if .Values.image.pullPolicy }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- end }}
          args:
            - --allowed-upstreams={{ .Values.ghproxy.allowedUpstreams }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ghproxy
  namespace: kelos-system
  labels:
    app.kubernetes.io/name: ghproxy
spec:
  selector:
    app.kubernetes.io/name: ghproxy
  ports:
    - name: http
      port: 8888
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
