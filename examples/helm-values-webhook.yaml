# Example Helm values to enable webhook servers

# Enable webhook server for GitHub
webhookServer:
  sources:
    # Enable GitHub webhook server
    github:
      enabled: true
      replicas: 2 # For high availability
      secretName: github-webhook-secret # Must contain WEBHOOK_SECRET key

  # Enable ingress for external webhook access (traditional Ingress API)
  ingress:
    enabled: true
    className: "nginx" # Or your ingress class
    host: "webhooks.your-domain.com"

    # Enable TLS for secure HTTPS connections
    tls:
      enabled: true
      # secretName: ""  # Leave empty for cert-manager auto-generation
      # secretName: "webhook-tls-secret"  # Or specify existing secret name

    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

  # Alternative: Enable Gateway API for external webhook access (next-gen routing)
  # Note: Only enable one of ingress OR gateway, not both
  gateway:
    enabled: false # Set to true to use Gateway API instead of Ingress
    gatewayClassName: "istio" # Or your gateway class (e.g., "istio", "envoy-gateway", "kong")
    gatewayName: "kelos-webhook-gateway"
    host: "webhooks.your-domain.com"

    # Enable TLS for secure HTTPS connections
    tls:
      enabled: true
      # Reference to TLS certificates (Gateway API style)
      certificateRefs:
        - name: "webhook-tls-cert"
          kind: "Secret"
          # group: ""  # Optional, defaults to core API group

    annotations:
      # Gateway-specific annotations
      cert-manager.io/cluster-issuer: "letsencrypt-prod"

# Use versioned images for production
image:
  tag: "v1.0.0" # Replace with your desired version
  pullPolicy: "IfNotPresent"

# Enable telemetry for monitoring
telemetry:
  enabled: true
